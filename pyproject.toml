[project]
name = "minethon"
version = "0.1.0a1"
description = "A Python-first Mineflayer SDK for building Minecraft bots with a typed, high-level async API."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "javascript>=1!1.2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/minethon"]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "pytest-cov>=7.1",
    "ruff>=0.15",
    "pyright>=1.1",
]

[tool.ruff]
src = ["src"]
fix = true
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # conflict with formatter
    "E501", "Q000", "Q003", "COM812", "ISC001",

    # optimize
    "D", "ARG", "FBT001", "FBT002", "N818", "S101",

    # bridge layer unavoidably uses Any for JS proxy objects
    "ANN401",
    # exception message style — too noisy for SDK with many raise sites
    "TRY003", "EM101", "EM102",
    # bridge layer catches broad JS proxy exceptions by design
    "BLE001",
    # JS interop uses camelCase locals; contextlib.suppress less clear than try/except
    "N806", "SIM105",
    # try/except wrapping style for bridge error conversion
    "TRY300", "TRY301",
    # internal cross-module _private access within the package
    "SLF001",
    # timeout param is standard SDK pattern, not an antipattern
    "ASYNC109",
    # delayed import needed for JSPyBridge conditional loading
    "PLC0415"
]
allowed-confusables = ["（", "）", "，", "！"]
pylint.max-args = 6
mccabe.max-complexity = 20
pylint.max-branches = 15
pylint.max-statements = 65

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["INP001", "S105", "S106", "S107", "PLR2004", "SLF001", "ANN001", "SIM117"]
"src/minethon/_bridge/runtime.py" = ["S603", "PLW1510", "PLR2004"]
"src/minethon/_bridge/js_bot.py" = ["S110", "FBT003"]
"src/minethon/_bridge/plugin_host.py" = ["FBT003"]
"src/minethon/bot.py" = ["FBT003", "PLR2004", "PLR0913"]

[tool.pyright]
include = ["src"]
typeCheckingMode = "strict"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests requiring a running Minecraft server",
]

[tool.coverage.run]
source = ["src/minethon"]
omit = ["src/minethon/_bridge/js/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
