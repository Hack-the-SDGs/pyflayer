[project]
name = "minethon"
version = "0.1.0a1"
description = "A Python-first Mineflayer SDK for building Minecraft bots with a typed, high-level async API."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "javascript>=1!1.2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/minethon"]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "pytest-cov>=7.1",
    "ruff>=0.15",
    "pyright>=1.1",
]

[tool.ruff]
src = ["src"]
fix = true
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # conflict with formatter
    "E501", "Q000", "Q003", "COM812", "ISC001",

    # optimize
    "D", "ARG", "FBT001", "FBT002", "N818", "S101"
]
allowed-confusables = ["（", "）", "，", "！"]
pylint.max-args = 6
mccabe.max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["INP001", "S105", "S106", "S107", "PLR2004", "SLF001", "ANN001", "SIM117"]

[tool.pyright]
include = ["src"]
typeCheckingMode = "strict"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests requiring a running Minecraft server",
]

[tool.coverage.run]
source = ["src/minethon"]
omit = ["src/minethon/_bridge/js/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
