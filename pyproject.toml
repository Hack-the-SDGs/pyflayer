[project]
name = "minethon"
version = "0.1.0"
description = "A Python-first Mineflayer SDK"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "javascript>=1!1.2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/minethon"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "pyright>=1.1",
]

[tool.ruff]
src = ["src"]
line-length = 88

[tool.pyright]
include = ["src"]
typeCheckingMode = "strict"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests requiring a running Minecraft server",
]

[tool.coverage.run]
source = ["src/minethon"]
omit = ["src/minethon/_bridge/js/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
